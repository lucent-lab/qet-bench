name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: qet-bench
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            qet-bench/pyproject.toml
            qet-bench/requirements-lock.txt

      - name: Install package
        run: |
          python -m pip install --upgrade -c requirements-lock.txt pip setuptools wheel
          python -m pip install -e ".[dev]" -c requirements-lock.txt

      - name: Run tests
        run: python -m pytest

      - name: Reproduce exact benchmarks
        run: python scripts/reproduce_benchmarks.py

      - name: Generate deterministic figures
        run: python scripts/make_all_figures.py
